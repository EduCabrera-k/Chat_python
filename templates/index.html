<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VideoChat Grupal</title>
    <style>
        /* Estilos generales para el diseño de la página */
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; text-align: center; }
        
        /* Configuración para que los videos se acomoden automáticamente */
        #videos { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; 
        }
        
        /* Diseño de los cuadros de video */
        video { 
            width: 320px; height: 240px; background: #222; border-radius: 10px; 
            object-fit: cover; border: 3px solid #ddd; 
        }
        
        /* Color de borde diferente para el video del usuario local */
        #videoLocal { border-color: #4CAF50; }
        
        /* Estilo de la caja de chat */
        #chat { 
            width: 100%; max-width: 600px; height: 200px; background: #fff; 
            border: 1px solid #ccc; margin: 20px auto; overflow-y: auto; padding: 10px; text-align: left;
            position: relative;
        }
        
        .ui { margin-bottom: 10px; position: relative; }
        input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        
        /* Diseño de los botones */
        button { padding: 8px 15px; border-radius: 5px; border: none; background: #4CAF50; color: white; cursor: pointer; margin: 2px; }
        button:disabled { background: #ccc; }
        
        /* Los botones de control inician ocultos hasta activar la cámara */
        #btnMute, #btnVideoOff { display: none; }

        /* Estilos para el panel flotante de emojis */
        #emojiPicker {
            display: none;
            position: absolute;
            bottom: 50px;
            right: 15%;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 100;
        }
        #emojiPicker span {
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
        }
        #emojiPicker span:hover { background: #eee; }
        #btnEmoji { background: #ffc107; color: black; font-size: 18px; }
    </style>
</head>
<body>

    <h2>Reunión Multi-Usuario</h2>

    <div class="ui">
        <input id="nombre" placeholder="Tu nombre">
        <input id="sala" style="width: 15%;" placeholder="Nombre o Numero de la sala">
        <button id="btnEntrar">Unirse a Sala</button>
    </div>

    <div class="ui">
        <br>
        <text>Recuerda encender la camara antes de entrar a una sala</text>
        <br>
        <br>
        <button id="btnCamara">1. Activar Cámara 🎥</button>
        <button id="btnMute">Silenciar Micrófono 🎙️</button>
        <button id="btnVideoOff">Apagar Cámara 📷</button>
    </div>

    <div id="videos">
        <video id="videoLocal" autoplay muted playsinline></video>
    </div>

    <div id="chat"></div>

    <div class="ui">
        <div id="emojiPicker"></div>
        <input id="mensaje" style="width: 60%" placeholder="Escribe un mensaje...">
        <button id="btnEmoji">😊</button>
        <button id="btnEnviar">Enviar</button>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/static/client.js"></script>
</body>
</html>
